<main>
    <h2>İletişim Formu</h2>
    <form action="mailto:ornek@mail.com" method="post" enctype="text/plain">
        <label for="isim">Adınız:</label><br>
        <input type="text" id="isim" name="isim" required><br><br>
        
        <label for="mesaj">Mesajınız:</label><br>
        <textarea id="mesaj" name="mesaj" rows="4" cols="50"></textarea><br><br>
        
        <input type="submit" value="Gönder">
        <input type="reset" value="Temizle">
    </form>

    <hr>
    
    <h2>Marka Tanıtımımız</h2>

        <source src="tanitim.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <h2>Radyo Reklamımız</h2>
    <audio controls>
        <source src="muzik.mp3" type="audio/mpeg">
        Tarayıcınız ses etiketini desteklemiyor.
    </audio>
