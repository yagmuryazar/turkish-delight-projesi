<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sepetim - Turkish Delight</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .cart-container {
            max-width: 850px;
            margin: 60px auto;
            background-color: #fff;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .cart-table th {
            background-color: #FDF6F7;
            color: #A86B69;
            font-family: 'Playfair Display', serif;
            font-weight: normal;
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #D6A3A3;
            letter-spacing: 1px;
        }
        .cart-table td {
            padding: 20px 15px;
            border-bottom: 1px solid #f0e6e6;
            color: #555;
            vertical-align: middle;
            font-size: 14px;
        }
        .cart-product-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            vertical-align: middle;
            margin-right: 15px;
        }
        .cart-total {
            text-align: right;
            font-size: 22px;
            font-family: 'Playfair Display', serif;
            color: #A86B69;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        .checkout-btn {
            background-color: #222;
            color: #fff;
            border: none;
            padding: 16px 45px;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.4s;
            float: right;
        }
        .checkout-btn:hover {
            background-color: #C68E8C;
        }
        /* Yeni Kaldır Butonu Tasarımı */
        .remove-btn {
            background: none;
            border: none;
            color: #999;
            text-decoration: underline;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .remove-btn:hover {
            color: #e74c3c; /* Üzerine gelince zarif bir kırmızı olur */
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>

<header>
    <h1>SEPETİM</h1>
</header>

<nav>
    <a href="index.html">Ana Sayfa</a>
    <a href="hakkimizda.html">Hakkımızda</a>
    <a href="urunler.html">Ürünlerimiz</a>
    <a href="iletisim.html">İletişim</a>
    <a href="sepet.html" style="font-weight: bold; letter-spacing: 3px;">SEPETİM (2)</a>
</nav>

<main>
    <div class="cart-container clearfix">
        <h2 style="text-align: left; margin-bottom: 30px; font-size: 24px;">Alışveriş Özeti</h2>
        
        <table class="cart-table">
            <tr>
                <th>Ürün</th>
                <th>Adet</th>
                <th>Birim Fiyat</th>
                <th>Toplam</th>
                <th>İşlem</th>
            </tr>
            <tr>
                <td>
                    <img src="tonik1.jpg" alt="Tonik" class="cart-product-img">
                    Saf Gül Suyu Özlü Tonik
                </td>
                <td>1</td>
                <td>1.850,00 TL</td>
                <td>1.850,00 TL</td>
                <td><button class="remove-btn" onclick="this.closest('tr').style.display='none';">Kaldır</button></td>
            </tr>
            <tr>
                <td>
                    <img src="krem1.jpg" alt="Krem" class="cart-product-img">
                    Premium Gece Bakım Kremi
                </td>
                <td>1</td>
                <td>3.950,00 TL</td>
                <td>3.950,00 TL</td>
                <td><button class="remove-btn" onclick="this.closest('tr').style.display='none';">Kaldır</button></td>
            </tr>
        </table>

        <div class="cart-total">
            <strong>Ara Toplam: 5.800,00 TL</strong>
        </div>

        <button class="checkout-btn" onclick="alert('Siparişiniz başarıyla oluşturuldu! Lüksün ve doğallığın tadını çıkarın.')">Alışverişi Tamamla</button>
    </div>
</main>

<footer>
    <p>&copy; 2026 Turkish Delight Kozmetik. Tüm hakları saklıdır.</p>
</footer>

</body>
</html>
